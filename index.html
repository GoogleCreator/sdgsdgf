<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Shield • Protected Paste</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --accent: #00ff9f;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container { width: 100%; max-width: 720px; padding: 40px 20px; }
        
        .card {
            background: #111111;
            border-radius: 16px;
            border: 1px solid #222;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 255, 159, 0.08);
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00ff9f, #00cc7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 18px; }
        
        textarea {
            width: 100%;
            height: 320px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 15px;
            resize: vertical;
            margin-bottom: 20px;
        }
        
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 159, 0.3);
        }
        
        .result { margin-top: 30px; display: none; }
        
        .link-box {
            background: #1a1a1a;
            border: 1px solid #00ff9f;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 16px;
            color: #00ff9f;
        }
        
        .copy-btn {
            background: #222;
            color: #00ff9f;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Lua Shield</h1>
            <p class="subtitle">Your code stays hidden in the URL hash</p>
            
            <textarea id="codeInput" placeholder="Paste your Lua code here..."></textarea>
            
            <button onclick="protectCode()">PROTECT CODE & GENERATE LINK</button>
            
            <div id="result" class="result">
                <div style="color:#00ff9f; text-align:center; margin:15px 0;">🔒 Code protected in URL hash</div>
                
                <p style="margin:20px 0 10px 0; color:#aaa;">Loadstring to share:</p>
                <div id="loadstringBox" class="link-box"></div>
                
                <button class="copy-btn" onclick="copyLoadstring()">📋 Copy Loadstring</button>
            </div>
        </div>
    </div>

    <script>
        function encodeCode(code) {
            const b64 = btoa(unescape(encodeURIComponent(code)));
            return b64.split('').reverse().join('');
        }
        
        function decodeCode(encoded) {
            try {
                const b64 = encoded.split('').reverse().join('');
                return decodeURIComponent(escape(atob(b64)));
            } catch(e) { return null; }
        }
        
        function protectCode() {
            const input = document.getElementById('codeInput').value.trim();
            if (!input) return alert("Paste your Lua code first!");
            
            const encoded = encodeCode(input);
            const baseUrl = window.location.href.split('#')[0];
            const fullLink = baseUrl + '#' + encoded;
            
            const loadstring = `loadstring(game:HttpGet("${fullLink}"))()`;
            
            document.getElementById('loadstringBox').textContent = loadstring;
            document.getElementById('result').style.display = 'block';
        }
        
        function copyLoadstring() {
            const text = document.getElementById('loadstringBox').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = orig, 1800);
            });
        }
        
        // Auto run when hash is present (for loadstring)
        window.onload = () => {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const code = decodeCode(hash);
                if (code) {
                    // In Roblox this would run: load(code)()
                    console.log("%c🔓 Protected Lua code loaded successfully", "color:#00ff9f;font-size:14px");
                    // For preview in browser:
                    alert("Protected code loaded!\n\nCheck console for full code.");
                    console.log(code);
                }
            }
        };
    </script>
</body>
</html>
